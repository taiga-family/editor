@if (!disabled()) {
    <button
        type="button"
        [style.display]="'none'"
    >
        <!-- @note: this is a html hack to avoid autofocus, if the parent element is a label  -->
    </button>
    <div
        [tabIndex]="focusable ? 0 : -1"
        (focus)="onTopFocus()"
    ></div>
    <div
        [tabIndex]="focusable ? 0 : -1"
        (focus)="onBottomFocus()"
    ></div>
}

<fieldset
    tuiToolbarNavigationManager
    [disabled]="disabled()"
>
    <ng-content />
</fieldset>
