<tui-loader [loading]="!!(uploadService.loading$ | async)">
    <tui-editor
        class="editor"
        [formControl]="control"
        [tools]="builtInTools"
        (fileAttached)="attach($event)"
    />
</tui-loader>

<tui-accordion [closeOthers]="false">
    <button [tuiAccordion]="isE2E">HTML</button>
    <tui-expand>
        <ng-container *tuiItem>
            <tui-editor-socket [content]="control.value" />
        </ng-container>
    </tui-expand>

    <button [tuiAccordion]="isE2E">Text</button>
    <tui-expand>
        <ng-container *tuiItem>
            <span class="code">{{ control.value }}</span>
        </ng-container>
    </tui-expand>
</tui-accordion>
