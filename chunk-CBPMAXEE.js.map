<tui-textfield
    tuiChevron
    tuiDropdownAlign="start"
    tuiDropdownLimitWidth="min"
    tuiTextfieldSize="m"
    class="t-select"
    [style.flex]="'0 0 auto'"
>
    <input
        tuiSelect
        [ngModelOptions]="{standalone: true}"
        [(ngModel)]="mode"
    />
    <tui-data-list-wrapper
        *tuiDropdown
        [items]="modes"
    />
</tui-textfield>
@if (isHex) {
    <tui-textfield tuiTextfieldSize="m">
        <input
            #hexInput
            tuiInput
            [maskito]="hexMask"
            [value]="hex"
            (input)="onHexChange(hexInput.value)"
        />
    </tui-textfield>
} @else {
    <tui-textfield
        tuiTextfieldSize="m"
        class="t-rgb"
    >
        <input
            tuiInputNumber
            [max]="255"
            [min]="0"
            [ngModel]="color()[0]"
            [ngModelOptions]="{standalone: true}"
            (ngModelChange)="onRgbChange($event, color()[1], color()[2], color()[3])"
        />
    </tui-textfield>
    <tui-textfield
        tuiTextfieldSize="m"
        class="t-rgb"
    >
        <input
            tuiInputNumber
            [max]="255"
            [min]="0"
            [ngModel]="color()[1]"
            [ngModelOptions]="{standalone: true}"
            (ngModelChange)="onRgbChange(color()[0], $event, color()[2], color()[3])"
        />
    </tui-textfield>
    <tui-textfield
        tuiTextfieldSize="m"
        class="t-rgb"
    >
        <input
            tuiInputNumber
            [max]="255"
            [min]="0"
            [ngModel]="color()[2]"
            [ngModelOptions]="{standalone: true}"
            (ngModelChange)="onRgbChange(color()[0], color()[1], $event, color()[3])"
        />
    </tui-textfield>
}
<tui-textfield
    tuiTextfieldSize="m"
    class="t-opacity"
    [style.flex]="'0 0 auto'"
>
    <input
        postfix="%"
        tuiInputNumber
        [max]="100"
        [min]="0"
        [ngModel]="opacity"
        [ngModelOptions]="{standalone: true}"
        (ngModelChange)="onRgbChange(color()[0], color()[1], color()[2], $event / 100)"
    />
</tui-textfield>
