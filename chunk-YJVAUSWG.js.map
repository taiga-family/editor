<tui-doc-page>
    <tui-doc-example
        description="The Heading extension adds support for headings of different levels. Headings are rendered with h1, h2, h3, h4, h5 or h6 HTML tags. By default all six heading levels (or styles) are enabled, but you can pass an array to only allow a few levels. Check the usage example to see how this is done. Type #  at the beginning of a new line and it will magically transform to a heading, same for ## , ### , #### , #####  and ######."
        heading="Heading"
        [component]="component1"
        [content]="example1"
    />

    <tui-doc-example
        description="You can use any size for paragraph like in your Google Docs"
        heading="Font size"
        [component]="component2"
        [content]="example2"
    />

    <tui-doc-example
        heading="Custom font size tool"
        [component]="component3"
        [content]="example3"
    />

    <tui-doc-example
        heading="Disable default font hotkeys"
        [component]="component4"
        [content]="example4"
    />

    <tui-doc-example
        heading="Override font option template"
        [component]="component5"
        [content]="example5"
        [description]="description"
    >
        <ng-template #description>
            Provide
            <code>fontOptionContent</code>
            property via
            <code>provideTuiEditorOptions</code>
            to fully customize how each option is rendered inside the font dropdown
        </ng-template>
    </tui-doc-example>
</tui-doc-page>
