<tui-editor
    class="editor"
    [formControl]="control"
    [tools]="builtInTools"
/>

<tui-accordion [closeOthers]="false">
    <button [tuiAccordion]="isE2E">HTML</button>
    <tui-expand>
        <ng-container *tuiItem>
            <tui-editor-socket [content]="control.value" />
        </ng-container>
    </tui-expand>

    <button [tuiAccordion]="isE2E">Text</button>
    <tui-expand>
        <ng-container *tuiItem>
            <span
                *ngIf="!isE2E; else fallback"
                class="code"
            >
                {{ control.value }}
            </span>

            <ng-template #fallback>Too heavy html code</ng-template>
        </ng-container>
    </tui-expand>
</tui-accordion>
