<tui-data-list>
    <div #container>
        @for (item of getFilteredItems(items, mentionSuggestions()); track item.login) {
            <button
                #button
                tuiOption
                type="button"
                (click)="setMention.emit(item)"
                (keydown.enter)="setMention.emit(item)"
            >
                {{ item.name }}
                <span [tuiAvatar]="item.avatar || (item.name | tuiInitials)"
                    size="s"
                   
                ></span>
            </button>
        }
    </div>
</tui-data-list>
