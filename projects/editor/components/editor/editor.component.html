<ng-template #toolbarTpl>
    @if (editorLoaded()) {
        <tui-toolbar-host [disabled]="!interactive()">
            <ng-container *polymorpheusOutlet="toolbar() ?? defaultToolbar as text; context: {$implicit: editor}">
                {{ text }}
            </ng-container>
        </tui-toolbar-host>
    }

    <ng-template #defaultToolbar>
        <tui-toolbar
            [tools]="tools()"
            (fileAttached)="fileAttached.emit($event)"
        >
            <ng-content select="tools" />
        </tui-toolbar>
    </ng-template>
</ng-template>

<ng-container *polymorpheusOutlet="!floatingToolbar() ? toolbarTpl : null as text">
    {{ text }}
</ng-container>
<div
    tuiEditorLabel
    (mousedown)="focus($event)"
>
    <ng-content />
    @if (hasPlaceholder) {
        <div tuiEditorPlaceholder>
            {{ placeholder() || exampleText() }}
        </div>
    }
</div>

<tui-scrollbar
    tuiEditorScrollbar
    (keydown)="focus($event)"
    (mousedown)="focus($event)"
>
    <ng-container [ngTemplateOutlet]="editorTpl" />
</tui-scrollbar>

<tui-editor-socket />

<ng-template #editorTpl>
    <!-- tuiDropdownDirection - prevent flaky -->
    <div
        tuiDropdownAlign="left"
        tuiDropdownDirection="bottom"
        tuiDropdownLimitWidth="auto"
        tuiTiptapEditor
        class="tui-editor-socket"
        [attr.data-contenteditable]="interactive()"
        [editable]="interactive()"
        [tuiDropdown]="dropdown"
        [tuiDropdownMinHeight]="64"
        [tuiToolbarDropdown]="dropdownSelectionHandler"
        [tuiToolbarDropdownPosition]="isLinkSelected ? 'tag' : floatingToolbar() ? 'selection' : 'tag'"
        (valueChange)="onModelChange($event)"
    ></div>
</ng-template>

<ng-template #dropdown>
    <ng-container *polymorpheusOutlet="floatingToolbar() ? toolbarTpl : null as text">
        {{ text }}
    </ng-container>

    @if (isLinkSelected) {
        <tui-edit-link
            #link
            tuiEditorRootEditLink
            [anchorMode]="isJumpAnchorSelected"
            (addLink)="link.hasAnchorMode() ? addAnchor($event) : addLink($event); closeDropdown()"
            (removeLink)="link.hasAnchorMode() ? removeAnchor() : removeLink(); closeDropdown()"
        />
    }

    <!-- TODO: drop mention in v5 -->
    @if (isMentionMode) {
        <ng-content select="mention" />
    }

    <ng-container *polymorpheusOutlet="tuiDropdown?.tuiDropdownOpen ? dropdownContent() : null as text">
        {{ text }}
    </ng-container>
</ng-template>
