name: 🤖 Screenshot Report
on:
  workflow_run:
    workflows: [⚙️ E2E tests]
    types: [requested, completed]
    branches-ignore:
      - 'v[0-9].x'
      - 'release/**'
  pull_request:
    types: [closed]

jobs:
  awake-screenshot-bot:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - uses: taiga-family/argus@3d8d5030d34d6f8ea82e260f9651b3dbab72ddf6 # main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
