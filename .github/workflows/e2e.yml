name: ⚙️ E2E tests
on:
  pull_request:

env:
  RETRY_COUNT: 2
  PW_RESULT: ./projects/demo-playwright/tests-results

jobs:
  cypress:
    name: Cypress / Component Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiga-family/ci/actions/setup/variables@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
      - uses: taiga-family/ci/actions/setup/node@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
      - uses: taiga-family/ci/actions/setup/cypress@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
      - run: npx nx component-test demo-cypress

  e2e:
    name: E2E playwright
    runs-on: ubuntu-latest
    outputs:
      details_url: ${{ steps.e2e-report.outputs.details_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiga-family/ci/actions/setup/variables@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
      - uses: taiga-family/ci/actions/setup/node@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
      - uses: taiga-family/ci/actions/setup/playwright@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0

      - run: npx nx build editor-demo -c development
      - uses: taiga-family/ci/actions/run/serve@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
        with:
          port: ${{ env.NG_SERVER_PORT }}
          directory: ${{ env.DIST }}

      - run: npx nx e2e editor-demo-playwright -- --update-snapshots

      - uses: taiga-family/ci/actions/run/clone@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
        with:
          branch: snapshots/demo/next/${{ github.base_ref }}
          destination: ${{ env.DIST_NEXT }}

      - uses: taiga-family/ci/actions/run/serve@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
        with:
          port: ${{ env.NG_SERVER_PORT }}
          directory: ${{ env.DIST_NEXT }}

      - run: npx nx e2e editor-demo-playwright
        continue-on-error: true

      - run: tree ${{ env.PW_RESULT }}
      - name: Deploy e2e report
        id: e2e-report
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        continue-on-error: true
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TUI_EDITOR }}
          channelId: pr${{ github.event.number }}-${{ github.head_ref }}-e2e
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          target: taiga-editor-e2e-report
          projectId: taiga-editor
          disableComment: 'true'
          expires: 1d

      - name: Upload report artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ env.PW_RESULT }}/test-results.json
          name: ${{ env.PLAYWRIGHT_SNAPSHOTS_ARTIFACTS_KEY }}_report
          compression-level: 0
          retention-days: 1

      - uses: taiga-family/ci/actions/setup/playwright-combine-failed-screenshot@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0

      - name: Upload artifacts / ${{ env.PLAYWRIGHT_SNAPSHOTS_ARTIFACTS_KEY }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ env.PW_RESULT }}/**/*-retry${{ env.RETRY_COUNT }}/**/*.diff.png
          name: ${{ env.PLAYWRIGHT_SNAPSHOTS_ARTIFACTS_KEY }}
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 1

  result:
    name: E2E result
    needs: [e2e, cypress]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiga-family/ci/actions/setup/variables@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0

      - name: Download artifacts for Playwright
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.PW_RESULT }}
          name: ${{ env.PLAYWRIGHT_SNAPSHOTS_ARTIFACTS_KEY }}
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.PW_RESULT }}
          name: ${{ env.PLAYWRIGHT_SNAPSHOTS_ARTIFACTS_KEY }}_report

      - uses: taiga-family/ci/actions/setup/playwright-diff-check@44fd3eb3c46e9e6c39fd3820479c467aa75c8028 # v1.221.0
        with:
          pw-result: ${{ env.PW_RESULT }}

      - uses: daun/playwright-report-summary@8bb85779022480a59ed8d33d9a4b8bda1c67666b # v4.0.0
        if: always()
        with:
          custom-info: 'For more information, [see our report](${{ needs.e2e.outputs.details_url }})'
          report-file: ${{ env.PW_RESULT }}/test-results.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
