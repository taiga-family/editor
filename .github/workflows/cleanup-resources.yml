name: 🤖 Cleanup resources after close PR
on:
  pull_request:
    types: [closed]

jobs:
  purge-cache:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      BRANCH: refs/pull/${{ github.event.number }}/merge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        continue-on-error: true
      - run: |
          gh cache list --ref $BRANCH > cache.log && cat cache.log

          for cacheId in $(gh cache list --ref $BRANCH --json id | jq -r .[].id); do
              echo "> gh cache delete $cacheId"
              gh cache delete $cacheId
          done

  delete-firebase-channels:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      channel: pr${{ github.event.number }}-${{ github.head_ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Drop e2e report site
        uses: w9jds/firebase-action@46a04d83eb19539c893cc86fce57ecbd82ba3111 # v15.14.0
        continue-on-error: true
        with:
          args: hosting:channel:delete ${{ env.channel }}-e2e --site taiga-editor-e2e-report -f
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TUI_EDITOR }}
          PROJECT_ID: taiga-editor
      - name: Drop preview demo site
        uses: w9jds/firebase-action@46a04d83eb19539c893cc86fce57ecbd82ba3111 # v15.14.0
        continue-on-error: true
        with:
          args: hosting:channel:delete ${{ env.channel }}-demo --site taiga-editor -f
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TUI_EDITOR }}
          PROJECT_ID: taiga-editor
