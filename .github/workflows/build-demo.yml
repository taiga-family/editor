name: ⚙️ Build demo
on:
  push:
    branches:
      - main

jobs:
  build-demo:
    name: Build demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiga-family/ci/actions/setup/variables@cc838cc3dcb2e92a7090a3d9390f8992a6785fe3 # v1.218.0
      - uses: taiga-family/ci/actions/setup/node@cc838cc3dcb2e92a7090a3d9390f8992a6785fe3 # v1.218.0
      - run: npx nx build editor-demo
      - run: npx --yes bundlemon --config .github/.bundlemonrc.json

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
