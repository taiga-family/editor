name: ⚙️ Lint
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiga-family/ci/actions/setup/variables@8daf3354cad97676fd0bb06cc12f2498441130c1 # v1.200.0
      - uses: taiga-family/ci/actions/setup/node@8daf3354cad97676fd0bb06cc12f2498441130c1 # v1.200.0
      - name: Run linting tools
        run: |
          npm run cspell

          if [[ "${{ env.SUPPORT_AUTO_PUSH }}" == "true" ]]; then
              npm run stylelint -- --fix
              npm run prettier -- --write
              npm run lint -- --fix
          else
              npm run stylelint
              npm run prettier -- --check
              npm run lint
          fi
      - uses: taiga-family/ci/actions/auto/push@8daf3354cad97676fd0bb06cc12f2498441130c1 # v1.200.0
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
